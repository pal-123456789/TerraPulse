name: CI

# Lints and builds the project on every push and pull request to ensure
# the codebase stays green.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to 22 to match deploy.yml
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true # Cleaner way to allow workflow to continue if lint fails

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
